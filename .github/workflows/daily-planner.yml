- cron: "30 14 * * 1-5"name: Slack Daily Planner Bot

on:
  schedule:
    - cron: "0 15 * * 1-5"

jobs:
  post-daily-planner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post daily planner reminder to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PLANNER_FORM_URL: ${{ secrets.PLANNER_FORM_URL }}
        run: python app.py
